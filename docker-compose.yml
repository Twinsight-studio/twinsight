services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      # Host port overridable (see root .env.example) for machines already
      # running Postgres natively. Containers still talk over 5432 internally.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    env_file:
      - path: backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/postgres
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle at build time. The browser runs on the
        # host, so it must reach the API through the published host port.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${API_PORT:-8080}
    environment:
      # Server-side (RSC / route handlers) runs inside this container, so it
      # reaches the API over the compose network instead.
      API_BASE_URL: http://api:8080
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres-data:
