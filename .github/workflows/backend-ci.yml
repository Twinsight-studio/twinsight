# No path filter on the trigger itself — branch protection requires the
# "test" and "pooler-test" checks on every PR (including frontend-only
# ones), so these jobs must always run and report. The `changes` job below
# is what the other jobs gate their real steps on; if backend/ wasn't
# touched they still conclude successfully, just without doing the work.
name: backend-ci

on:
  pull_request:
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend-ci.yml'

  test:
    needs: changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
      DATABASE_MIGRATION_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        if: needs.changes.outputs.backend == 'true'
        with:
          version: "latest"

      - name: Install dependencies
        if: needs.changes.outputs.backend == 'true'
        run: uv sync

      - name: Ruff
        if: needs.changes.outputs.backend == 'true'
        run: uv run ruff check .

      - name: Pytest
        if: needs.changes.outputs.backend == 'true'
        run: uv run pytest

      - name: Alembic migration validation (upgrade head, then downgrade base)
        if: needs.changes.outputs.backend == 'true'
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base

      - name: Docker build — twinsight-api
        if: needs.changes.outputs.backend == 'true'
        run: docker build -f Dockerfile.api -t twinsight-api:ci .

      - name: Docker build — twinsight-job
        if: needs.changes.outputs.backend == 'true'
        run: docker build -f Dockerfile.job -t twinsight-job:ci .

  pooler-test:
    needs: changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # Transaction-mode pooler in front of Postgres, standing in for
      # Supabase's Supavisor (same pooling model). Proves NullPool +
      # psycopg3 + prepare_threshold=None (app/core/db.py) survive
      # concurrent load without prepared-statement/session errors.
      pgbouncer:
        image: edoburu/pgbouncer
        env:
          DB_HOST: postgres
          DB_PORT: 5432
          DB_USER: postgres
          DB_NAME: postgres
          POOL_MODE: transaction
          AUTH_TYPE: trust
          MAX_CLIENT_CONN: "1000"
          DEFAULT_POOL_SIZE: "20"
        ports:
          - 6432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        if: needs.changes.outputs.backend == 'true'
        with:
          version: "latest"

      - name: Install dependencies
        if: needs.changes.outputs.backend == 'true'
        run: uv sync

      - name: Pooler stress test (concurrent SELECT/transaction/commit/rollback bursts)
        if: needs.changes.outputs.backend == 'true'
        run: |
          uv run python scripts/pooler_stress_test.py \
            --dsn "postgresql+psycopg://postgres@localhost:6432/postgres"

  # Manual only — hits the real Supabase project's 6543 pooler. Not run on
  # every PR to avoid burning the Free plan's connection/compute quota.
  supabase-smoke-test:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Query real Supabase pooler once
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          uv run python -c "
          import asyncio
          from sqlalchemy import text
          from sqlalchemy.ext.asyncio import create_async_engine
          from sqlalchemy.pool import NullPool
          import os

          async def main():
              engine = create_async_engine(
                  os.environ['DATABASE_URL'],
                  poolclass=NullPool,
                  connect_args={'prepare_threshold': None},
              )
              async with engine.connect() as conn:
                  result = await conn.execute(text('SELECT 1'))
                  assert result.scalar_one() == 1
              await engine.dispose()
              print('Supabase smoke test OK')

          asyncio.run(main())
          "
