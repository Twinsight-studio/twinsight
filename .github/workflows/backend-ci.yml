# No path filter on the trigger itself — branch protection requires the
# "test" check on every PR (including frontend-only ones), so the job must
# always run and report. The `changes` job below is what it gates its real
# steps on; if backend/ wasn't touched it still concludes successfully,
# just without doing the work.
name: backend-ci

on:
  pull_request:
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend-ci.yml'

  test:
    needs: changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        if: needs.changes.outputs.backend == 'true'
        with:
          version: "latest"

      - name: Install dependencies
        if: needs.changes.outputs.backend == 'true'
        run: uv sync

      - name: Ruff
        if: needs.changes.outputs.backend == 'true'
        run: uv run ruff check .

      - name: Pytest
        if: needs.changes.outputs.backend == 'true'
        run: uv run pytest

      - name: Alembic migration validation (upgrade head, then downgrade base)
        if: needs.changes.outputs.backend == 'true'
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base

      - name: Docker build — twinsight-api
        if: needs.changes.outputs.backend == 'true'
        run: docker build -f Dockerfile.api -t twinsight-api:ci .

      - name: Docker build — twinsight-job
        if: needs.changes.outputs.backend == 'true'
        run: docker build -f Dockerfile.job -t twinsight-job:ci .

      # A successful build does not mean the image can start. The API image
      # deliberately omits pandas/numpy, so any accidental import of the
      # batch-only modules breaks it at runtime while CI stays green —
      # importing app.main here is what actually catches that.
      - name: Smoke — API image imports without the batch dependencies
        if: needs.changes.outputs.backend == 'true'
        run: |
          docker run --rm twinsight-api:ci python -c "
          import app.main
          try:
              import pandas
          except ImportError:
              print('API image is slim and imports cleanly')
          else:
              raise SystemExit('pandas leaked into the API image')
          "

      - name: Smoke — Job image can run the batch entrypoint
        if: needs.changes.outputs.backend == 'true'
        run: docker run --rm twinsight-job:ci python -c "import app.jobs.run_batch"
